{% extends "sqladmin/layout.html" %}
{% block content %}
<div class="col-12">
  <div class="card">
    <div class="card-header">
      <h3 class="card-title">一次性 SIP 密码已生成</h3>
    </div>
    <div class="card-body">
      <div class="alert alert-success" role="alert">
        已生成 {{ generated_count }} 条语音网关线路的一次性 SIP 密码，并写入云端 Asterisk。
        密码弹窗会自动打开；关闭弹窗后会回到语音网关线路列表。
      </div>
      {% if errors %}
      <div class="alert alert-danger" role="alert">
        部分线路生成失败：{{ "；".join(errors) }}
      </div>
      {% endif %}
      <a class="btn btn-primary" href="{{ url_for('admin:list', identity=model_view.identity) }}">返回语音网关线路</a>
    </div>
  </div>
</div>
{% endblock %}
