[global]
type = global
user_agent = AI-ACQ-Asterisk
endpoint_identifier_order = username,ip,anonymous

[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5060
external_signaling_address = REPLACE_SERVER_PUBLIC_IP
external_media_address = REPLACE_SERVER_PUBLIC_IP
local_net = 10.0.0.0/8
local_net = 172.16.0.0/12
local_net = 192.168.0.0/16

[dinstar8t]
type = endpoint
transport = transport-udp
context = from-dinstar8t
disallow = all
allow = alaw
allow = ulaw
direct_media = no
force_rport = yes
rewrite_contact = yes
rtp_symmetric = yes
timers = no
auth = dinstar8t-auth
aors = dinstar8t-aor
from_user = dinstar8t
callerid = AI获客 <dinstar8t>

[dinstar8t-auth]
type = auth
auth_type = userpass
username = dinstar8t
password = REPLACE_DINSTAR8T_SIP_PASSWORD

[dinstar8t-aor]
type = aor
max_contacts = 8
; 【审计B1】网关重启换源端口重注册时自动挤掉最旧 contact，
; 避免 8 个 stale contact 占满后新 REGISTER 被 403 拒、断网后必须人工恢复。
remove_existing = yes
qualify_frequency = 30
