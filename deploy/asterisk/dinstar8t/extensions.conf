[from-ai-acq]
exten => s,1,NoOp(AI ACQ realtime outbound call answered)
 same => n,Answer()
 same => n,Set(AI_ACQ_CALL_UUID=${UUID()})
 same => n,AudioSocket(${AI_ACQ_CALL_UUID},127.0.0.1:9019)
 same => n,Hangup()

[from-dinstar8t]
exten => _X.,1,NoOp(Inbound call from Dinstar 8T: ${CALLERID(all)})
 same => n,Hangup()
